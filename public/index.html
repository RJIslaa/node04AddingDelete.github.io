<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Cars App</h1>

  <h2>Add a Car</h2>

  <form id="carForm" method="POST" action="/api/cars">
    <input type="text" id="brand" placeholder="Brand" name="brand" required>
    <input type="text" id="make" placeholder="Make" name="make" required>
    <input type="number" id="year" placeholder="Year" name="year" required>
    <input type="text" id="color" placeholder="Color" name="color" required>
    <button type="submit">Add Car</button>
  </form>

  <h2>Cars</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Brand</th>
        <th>Make</th>
        <th>Year</th>
        <th>Color</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="carsTableBody"></tbody>
  </table>

  <script>
    const form = document.getElementById("carForm");
    const tableBody = document.getElementById("carsTableBody");

    async function loadCars() {
      const response = await fetch("/api/cars");
      const cars = await response.json();

      tableBody.innerHTML = "";

      cars.forEach(car => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${car.id}</td>
          <td>${car.brand}</td>
          <td>${car.make}</td>
          <td>${car.year}</td>
          <td>${car.color}</td>
          <td>
            <button onclick="deleteCar(${car.id})">Delete</button>
            <button onclick="editCar(${car.id})">Edit</button>
          </td>
        `;

        tableBody.appendChild(row);
      });
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();

      const newCar = {
        brand: document.getElementById("brand").value,
        make: document.getElementById("make").value,
        year: document.getElementById("year").value,
        color: document.getElementById("color").value
      };

      await fetch("/api/cars", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(newCar)
      });

      form.reset();
      loadCars();
    });
async function deleteCar(id) {
  if (!confirm("Delete this car?")) return;

  await fetch(`/api/cars/${id}`, { method: "DELETE" });
  loadCars();
}

async function editCar(id) {
  const response = await fetch(`/api/cars/${id}`);
  const car = await response.json();

  // Find the row and replace with editable fields
  const rows = tableBody.querySelectorAll("tr");
  rows.forEach(row => {
    if (row.querySelector("td")?.textContent == id) {
      row.innerHTML = `
        <td>${car.id}</td>
        <td><input value="${car.brand}" id="edit-brand"></td>
        <td><input value="${car.make}" id="edit-make"></td>
        <td><input value="${car.year}" id="edit-year" type="number"></td>
        <td><input value="${car.color}" id="edit-color"></td>
        <td>
          <button onclick="saveEdit(${car.id})">Save</button>
          <button onclick="loadCars()">Cancel</button>
        </td>
      `;
    }
  });
}

async function saveEdit(id) {
  const updated = {
    brand: document.getElementById("edit-brand").value,
    make: document.getElementById("edit-make").value,
    year: document.getElementById("edit-year").value,
    color: document.getElementById("edit-color").value
  };

  await fetch(`/api/cars/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(updated)
  });

  loadCars();
}
    loadCars();
  </script>
</body>
</html>
